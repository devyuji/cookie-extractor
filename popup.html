<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Cookie Extractor</title>
	
	<script type="module" src="app.js" defer></script>

	<style>
		:root {
			--bg-clr: #F0EDE5;
			--primary-clr: #004643;
		}

		body {
			background-color: var(--bg-clr);
			font-family: sans-serif;
			overflow: hidden;
		}

		main {
			min-width: 20rem;
			height: 100%;
			display: grid;
		}

		h1 {
			font-size: 1.2rem;
		}

		#get {
			border: none;
			background-color: var(--primary-clr);
			color: var(--bg-clr);
			padding: 0.5rem 1rem;
			border-radius: 2px;
			cursor: pointer;
		}

		#websiteName {
			font-size: 0.9rem;
		}

		.result-container {
			max-width: 20rem;
			max-height: 10rem;
			height: 100%;
			overflow-y: auto;

			overflow-wrap: break-word;
			margin: 0.5rem 0;
		}

		#result {
			font-size: 0.8rem;
		}
	</style>
  </head>

  <body>
	  <main>
			<div>
				<h1>Cookie Extractor</h1>
				<p id="websiteName"></p>

				<button type="button" id="get">GET</button>
			</div>

			<div class="result-container">
				<p id="result"></p>
			</div>
	  </main>

  </body>
</html>
